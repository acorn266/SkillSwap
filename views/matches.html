<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Find Matches — SkillSwap</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <script src="/js/theme.js"></script>
  <script src="/js/dbfeed.js"></script>
</head>
<body>
  <nav class="navbar">
    <a class="nav-logo" href="/dashboard">🔄 SkillSwap</a>
    <div class="nav-links">
      <a href="/dashboard">Dashboard</a>
      <a href="/my-skills">My Skills</a>
      <a href="/matches">Find Matches</a>
      <a href="/swaps">My Swaps</a>
      <a href="/analytics">Analytics</a>
      <a href="/portfolio">Portfolio</a>
      <a href="/network">Network</a>
      <button onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container">
    <h2>🎯 Your Matches</h2>
    <p style="color:#6b7280;margin-bottom:1.5rem;">People who can teach what you want — and want what you can teach. Powered by Neo4j.</p>

    <div id="matches-container">
      <p class="empty-msg">Loading matches...</p>
    </div>
  </div>

  <script>
    loadMatches();

    async function loadMatches() {
      const res = await fetch('/skills/matches');
      logDB('neo4j', 'Match engine — MATCH (me)-[:CAN_TEACH]->(:Skill)<-[:WANTS_TO_LEARN]-(other)');
      const matches = await res.json();
      const container = document.getElementById('matches-container');

      if (!matches.length) {
        container.innerHTML = `
          <div class="card" style="text-align:center;padding:3rem;">
            <p style="font-size:2rem;">🔍</p>
            <h3>No matches yet</h3>
            <p style="color:#6b7280;margin-top:0.5rem;">Add more skills and come back. Matches appear when someone else offers what you want and wants what you offer.</p>
            <a href="/my-skills"><button class="primary-btn" style="margin-top:1rem;width:auto;padding:0.6rem 1.5rem;">Add Skills</button></a>
          </div>`;
        return;
      }

      container.innerHTML = matches.map(m => `
        <div class="card match-card">
          <div class="match-header">
            <div class="avatar">${m.name.charAt(0).toUpperCase()}</div>
            <div>
              <h3>${m.name}</h3>
              <p style="color:#6b7280;font-size:0.9rem;">Perfect swap partner</p>
            </div>
            <button class="primary-btn swap-btn" onclick="sendSwapRequest('${m.userId}', '${m.name}', '${m.theyOffer[0]}', '${m.theyWant[0]}')">
              Request Swap
            </button>
          </div>
          <div class="match-skills">
            <div class="match-skill-col">
              <span class="col-label">They can teach you</span>
              ${m.theyOffer.map(s => `<span class="skill-tag offer">${s}</span>`).join('')}
            </div>
            <div class="swap-arrow">⇄</div>
            <div class="match-skill-col">
              <span class="col-label">They want to learn</span>
              ${m.theyWant.map(s => `<span class="skill-tag want">${s}</span>`).join('')}
            </div>
          </div>
        </div>`).join('');
    }

    async function sendSwapRequest(receiverId, name, offeredSkill, wantedSkill) {
      const res = await fetch('/swaps/request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ receiverId, offeredSkill, wantedSkill })
      });
      const data = await res.json();
      if (data.success) {
        alert(`Swap request sent to ${name}!`);
      } else {
        alert(data.error || 'Failed to send request');
      }
    }

    async function logout() {
      await fetch('/auth/logout', { method: 'POST' });
      window.location.href = '/';
    }
  </script>
</body>
</html>
