<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkillSwap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border-active: rgba(139,120,255,0.5);
      --accent: #7B6FFF;
      --accent-dim: rgba(123,111,255,0.15);
      --text-primary: #F0EEF8;
      --text-secondary: rgba(240,238,248,0.5);
      --text-muted: rgba(240,238,248,0.3);
      --error: #FF6B6B;
      --success: #4ECDC4;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background stars */
    .bg-stars {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(1); }
      to   { opacity: 0.8; transform: scale(1.3); }
    }

    /* Glowing orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: rgba(99,77,255,0.18);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 300px; height: 300px;
      background: rgba(180,100,255,0.12);
      bottom: -80px; right: -80px;
      animation-delay: -6s;
    }
    .orb-3 {
      width: 200px; height: 200px;
      background: rgba(80,200,220,0.08);
      top: 50%; right: 20%;
      animation-delay: -3s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.1); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      margin: 1.5rem;
      background: rgba(255,255,255,0.035);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2.25rem;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset,
                  0 40px 80px rgba(0,0,0,0.5);
      animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.5rem;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #7B6FFF, #A78BFA);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text {
      font-family: 'Sora', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }
    .tagline {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
      font-weight: 300;
      letter-spacing: 0.1px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.75rem;
      border: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 0.6rem;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: var(--text-secondary);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .tab-btn.active {
      background: rgba(123,111,255,0.2);
      color: #B8B0FF;
      border: 1px solid rgba(123,111,255,0.25);
    }
    .tab-btn:not(.active):hover {
      color: var(--text-primary);
      background: rgba(255,255,255,0.04);
    }

    /* Form */
    .form-panel { display: none; }
    .form-panel.active {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      animation: fadein 0.3s ease both;
    }
    @keyframes fadein {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .field label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .field input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .field input::placeholder { color: var(--text-muted); }
    .field input:focus {
      border-color: var(--border-active);
      background: rgba(123,111,255,0.07);
      box-shadow: 0 0 0 3px rgba(123,111,255,0.1);
    }

    .submit-btn {
      margin-top: 0.4rem;
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #6C63FF, #9B8FFF);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(108,99,255,0.35);
      position: relative;
      overflow: hidden;
    }
    .submit-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }
    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(108,99,255,0.5);
    }
    .submit-btn:hover::after { background: rgba(255,255,255,0.06); }
    .submit-btn:active { transform: translateY(0); }

    /* Message */
    #message {
      font-size: 0.82rem;
      text-align: center;
      min-height: 1.2rem;
      padding: 0.3rem 0;
      color: var(--error);
      transition: color 0.2s;
    }
    #message.success { color: var(--success); }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0.25rem 0;
    }
    .divider span { font-size: 0.75rem; color: var(--text-muted); }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Footer note */
    .footer-note {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .footer-note span {
      color: rgba(123,111,255,0.8);
      font-weight: 500;
    }

    /* DB pill */
    .db-pills {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }
    .db-pill {
      font-size: 0.68rem;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid;
      letter-spacing: 0.3px;
    }
    .pg  { color: #7EC8E3; border-color: rgba(126,200,227,0.25); background: rgba(126,200,227,0.07); }
    .neo { color: #64DFDF; border-color: rgba(100,223,223,0.25); background: rgba(100,223,223,0.07); }
    .cdb { color: #FF9A6C; border-color: rgba(255,154,108,0.25); background: rgba(255,154,108,0.07); }
    .rds { color: #FF6B6B; border-color: rgba(255,107,107,0.25); background: rgba(255,107,107,0.07); }
  </style>
</head>
<body>

<!-- Background stars -->
<div class="bg-stars" id="stars"></div>

<!-- Orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">⇄</div>
    <span class="logo-text">SkillSwap</span>
  </div>
  <p class="tagline">Teach what you know. Learn what you don't.</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login', this)">Login</button>
    <button class="tab-btn" onclick="switchTab('register', this)">Register</button>
  </div>

  <!-- Login Form -->
  <div class="form-panel active" id="panel-login">
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>
    <div id="message"></div>
    <button class="submit-btn" onclick="handleLogin()">Sign In</button>
  </div>

  <!-- Register Form -->
  <div class="form-panel" id="panel-register">
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="reg-name" placeholder="Aastha Karn" />
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Min. 8 characters" />
    </div>
    <div id="reg-message"></div>
    <button class="submit-btn" onclick="handleRegister()">Create Account</button>
  </div>

  <div class="db-pills">
    <span class="db-pill pg">PostgreSQL</span>
    <span class="db-pill neo">Neo4j</span>
    <span class="db-pill cdb">CouchDB</span>
    <span class="db-pill rds">Redis</span>
  </div>
</div>

<script>
  // Generate stars
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --d:${2 + Math.random()*4}s;
      animation-delay:-${Math.random()*4}s;
    `;
    container.appendChild(s);
  }

  // Tab switching
  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    document.getElementById('message').textContent = '';
  }

  // Login
  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const msg = document.getElementById('message');
    msg.className = '';
    if (!email || !password) { msg.textContent = 'Please fill in all fields.'; return; }
    msg.textContent = 'Signing in...';
    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        msg.className = 'success';
        msg.textContent = 'Welcome back!';
        setTimeout(() => window.location.href = '/dashboard', 600);
      } else {
        msg.textContent = data.error || 'Invalid credentials.';
      }
    } catch { msg.textContent = 'Connection error. Try again.'; }
  }

  // Register
  async function handleRegister() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const msg = document.getElementById('reg-message');
    msg.className = '';
    if (!name || !email || !password) { msg.textContent = 'Please fill in all fields.'; return; }
    if (password.length < 8) { msg.textContent = 'Password must be at least 8 characters.'; return; }
    msg.textContent = 'Creating account...';
    try {
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (res.ok) {
        msg.className = 'success';
        msg.textContent = 'Account created!';
        setTimeout(() => window.location.href = '/dashboard', 600);
      } else {
        msg.textContent = data.error || 'Registration failed.';
      }
    } catch { msg.textContent = 'Connection error. Try again.'; }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('panel-login').classList.contains('active')) handleLogin();
    else handleRegister();
  });
</script>
</body>
</html>
