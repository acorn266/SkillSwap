services:
  postgres:
    image: postgres:15
    container_name: skillswap_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: skillswap
    ports:
      - "5433:5432"

  couchdb:
    image: couchdb:3
    container_name: skillswap_couchdb
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password123
    ports:
      - "5984:5984"

  neo4j:
    image: neo4j:5
    container_name: skillswap_neo4j
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7
    container_name: skillswap_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  neo4j_data:
  redis_data:
